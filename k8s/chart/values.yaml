gateway:
  replicas: 1
  image: quickticket-gateway:v1
  port: 8080
  timeout: 5000

events:
  replicas: 1
  image: quickticket-events:v1
  port: 8081
  db:
    host: postgres
    port: 5432
    name: quickticket
    user: quickticket
    password: quickticket
  redis:
    host: redis
    port: 6379

payments:
  replicas: 1
  image: quickticket-payments:v1
  port: 8082
  failureRate: "0.0"
  latencyMs: "0"

postgres:
  image: postgres:17-alpine
  port: 5432
  db: quickticket
  user: quickticket
  password: quickticket

redis:
  image: redis:7-alpine
  port: 6379
